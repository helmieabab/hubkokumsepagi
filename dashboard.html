<!DOCTYPE html>
<html lang="ms">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dashboard Statistik - E-KOKUM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
      :root {
        --bg-color: #f4f7fe;
        --card-bg: rgba(255, 255, 255, 0.95);
        --text-main: #2b3674;
        --text-muted: #a3aed1;
        --primary: #4318ff;
        --secondary: #05cd99;
        --danger: #ee5d50;
        --warning: #ffb547;
      }
      body {
        background-color: var(--bg-color);
        font-family: 'Poppins', sans-serif;
        color: var(--text-main);
      }
      .bg-orb-1 { position: fixed; top: -100px; left: -100px; width: 400px; height: 400px; background: radial-gradient(circle, rgba(67,24,255,0.15) 0%, rgba(255,255,255,0) 70%); border-radius: 50%; z-index: -1; }
      
      .navbar-glass {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(15px);
        padding: 15px 0;
        position: sticky;
        top: 0;
        z-index: 1000;
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.03);
      }
      
      .stat-card {
        background: var(--card-bg);
        border-radius: 20px;
        padding: 25px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.03);
        height: 100%;
        border: 1px solid rgba(255,255,255,0.8);
        transition: transform 0.3s;
        display: flex;
        align-items: center;
      }
      .stat-card:hover { transform: translateY(-5px); }
      
      .stat-icon-wrapper {
        width: 70px;
        height: 70px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2rem;
        margin-right: 20px;
        flex-shrink: 0;
      }
      .icon-primary { background: rgba(67, 24, 255, 0.1); color: var(--primary); }
      .icon-secondary { background: rgba(5, 205, 153, 0.1); color: var(--secondary); }
      
      .stat-value { font-size: 2rem; font-weight: 700; color: var(--text-main); line-height: 1.2; }
      .stat-label { font-size: 0.85rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; margin-top: 5px; }
      
      .dashboard-panel {
        background: var(--card-bg);
        border-radius: 20px;
        padding: 25px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.03);
        margin-bottom: 30px;
        border: 1px solid rgba(255,255,255,0.8);
      }
      
      .panel-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: var(--text-main);
        margin-bottom: 20px;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .table-custom th { background-color: rgba(67, 24, 255, 0.05); color: var(--text-main); font-weight: 600; border-bottom: 2px solid rgba(67, 24, 255, 0.1); padding: 12px 15px; }
      .table-custom td { padding: 12px 15px; vertical-align: middle; border-bottom: 1px solid #edf2f7; color: #4a5568; }
      
      #loader { position: fixed; inset: 0; background: var(--bg-color); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.5s; }
      .chart-container { position: relative; height: 300px; width: 100%; }
    </style>
  </head>
  <body>

    <div class="bg-orb-1"></div>

    <div id="loader">
      <div class="spinner-border text-primary mb-3" style="width: 3rem; height: 3rem;"></div>
      <h5 class="fw-bold" style="color: var(--primary);">Menarik Data Statistik...</h5>
    </div>

    <nav class="navbar-glass mb-4">
      <div class="container d-flex justify-content-between align-items-center">
        <div class="fw-bold text-primary fs-5"><i class="fas fa-chart-line me-2"></i>DASHBOARD PRESTASI</div>
        <button class="btn btn-sm btn-outline-primary rounded-pill px-4 fw-bold" onclick="kembali()">
          <i class="fas fa-arrow-left me-1"></i> KEMBALI
        </button>
      </div>
    </nav>

    <div class="container pb-5">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold m-0" style="color: var(--text-main);">Ringkasan Aktiviti</h4>
        <button id="btnReset" onclick="sahkanReset()" class="btn btn-danger btn-sm rounded-pill px-3 shadow-sm fw-bold" style="display: none;">
          <i class="fas fa-sync-alt me-1"></i> Reset Data
        </button>
      </div>

      <div class="row g-4 mb-4">
        <div class="col-md-6">
          <div class="stat-card">
            <div class="stat-icon-wrapper icon-primary">
              <i class="fas fa-file-pdf"></i>
            </div>
            <div>
              <div class="stat-label">Jumlah Laporan Dimuat Naik</div>
              <div class="stat-value" id="valLaporan">0</div>
            </div>
          </div>
        </div>
        <div class="col-md-6">
          <div class="stat-card">
            <div class="stat-icon-wrapper icon-secondary">
              <i class="fas fa-user-check"></i>
            </div>
            <div>
              <div class="stat-label">Purata Kehadiran</div>
              <div class="stat-value" id="valPurata">0%</div>
            </div>
          </div>
        </div>
      </div>

      <div class="row g-4">
        <div class="col-lg-7">
          <div class="dashboard-panel h-100">
            <div class="panel-title">
              <i class="fas fa-chart-bar text-primary"></i> Kekerapan Laporan Mengikut Unit
            </div>
            <div class="chart-container">
              <canvas id="laporanChart"></canvas>
            </div>
            <div id="noDataChartMsg" class="text-center text-muted mt-5" style="display: none;">
              Belum ada data untuk dipaparkan.
            </div>
          </div>
        </div>

        <div class="col-lg-5">
          <div class="dashboard-panel h-100">
            <div class="panel-title">
              <i class="fas fa-list text-primary"></i> Perincian Unit
            </div>
            <div class="table-responsive" style="max-height: 300px; overflow-y: auto;">
              <table class="table table-custom table-borderless">
                <thead>
                  <tr>
                    <th>Nama Unit</th>
                    <th class="text-center">Bil. Laporan</th>
                  </tr>
                </thead>
                <tbody id="unitTableBody">
                  <tr><td colspan="2" class="text-center py-4">Sila tunggu, memuatkan data...</td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      // KEMASKINI: Masukkan URL Web App GAS Cikgu di sini
      const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwhEsy-d9SnOFihfJZRcC373sCvTqCGkaWHeWKHbFsaMBIf4Q7D5dtnNyPcsjwpCYWF1w/exec";
      let myChart = null;

      window.onload = () => {
        const role = sessionStorage.getItem("userRole");
        if (!role || role === 'IBUBAPA') {
          alert("Akses dinafikan!");
          window.location.href = "index.html";
          return;
        }

        // Papar butang reset hanya untuk Admin
        if (role === 'ADMIN') {
          document.getElementById('btnReset').style.display = 'block';
        }

        fetchData();
      };

      function fetchData() {
        // Ambil data dari GAS melalui fetch
        fetch(`${WEB_APP_URL}?action=getDashboardData`)
          .then(response => response.json())
          .then(data => renderDashboard(data))
          .catch(err => {
            console.error(err);
            document.getElementById('loader').style.display = 'none';
            alert("Ralat menarik data. Pastikan Web App GAS telah di-deploy dengan akses 'Anyone'.");
          });
      }

      function renderDashboard(data) {
        document.getElementById('loader').style.opacity = '0';
        setTimeout(() => document.getElementById('loader').style.display = 'none', 500);
        
        document.getElementById('valLaporan').innerText = data.totalLaporan || 0;
        document.getElementById('valPurata').innerText = (data.hadirPurata || 0) + '%';

        const unitData = data.unitHantar || {};
        const unitNames = Object.keys(unitData);
        const unitCounts = Object.values(unitData);

        if (unitNames.length === 0) {
          document.getElementById('laporanChart').style.display = 'none';
          document.getElementById('noDataChartMsg').style.display = 'block';
          document.getElementById('unitTableBody').innerHTML = '<tr><td colspan="2" class="text-center text-muted py-4">Tiada rekod laporan.</td></tr>';
          return;
        }

        let tbodyHtml = '';
        unitNames.forEach((unit, index) => {
          tbodyHtml += `
            <tr>
              <td class="fw-semibold">${unit}</td>
              <td class="text-center"><span class="badge bg-primary rounded-pill px-3">${unitCounts[index]}</span></td>
            </tr>
          `;
        });
        document.getElementById('unitTableBody').innerHTML = tbodyHtml;

        const ctx = document.getElementById('laporanChart').getContext('2d');
        if (myChart) { myChart.destroy(); }

        myChart = new Chart(ctx, {
          type: 'bar',
          data: {
            labels: unitNames,
            datasets: [{
              label: 'Jumlah Laporan',
              data: unitCounts,
              backgroundColor: 'rgba(67, 24, 255, 0.7)',
              borderRadius: 5
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
              y: { beginAtZero: true, ticks: { stepSize: 1 } },
              x: { grid: { display: false } }
            }
          }
        });
      }

      function kembali() {
        window.location.href = "index.html";
      }

      function sahkanReset() {
        if (confirm("AMARAN: Padam semua data statistik?")) {
          document.getElementById('loader').style.display = 'flex';
          fetch(`${WEB_APP_URL}?action=resetStatistikDashboard`)
            .then(res => res.json())
            .then(res => {
              if (res.success) {
                alert("Berjaya direset!");
                location.reload();
              } else {
                alert("Ralat: " + res.error);
                document.getElementById('loader').style.display = 'none';
              }
            });
        }
      }
    </script>
  </body>
</html>
